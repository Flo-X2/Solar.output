<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#020b18"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Solar Forecast"/>
  <title>Solar Yield Forecast</title>
  <script>
    const manifest = {
      name:"Solar Yield Forecast", short_name:"SolarCast",
      start_url:".", display:"standalone",
      background_color:"#020b18", theme_color:"#020b18",
      icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f59e0b'/><text y='.9em' font-size='80' x='10'>☀</text></svg>",sizes:"any",type:"image/svg+xml"}]
    };
    const b=new Blob([JSON.stringify(manifest)],{type:"application/json"});
    const l=document.createElement("link"); l.rel="manifest"; l.href=URL.createObjectURL(b);
    document.currentScript.after(l);
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#020b18;font-family:-apple-system,system-ui,sans-serif;color:#f1f5f9}
    #root{min-height:100%;padding-bottom:48px}
    input,button{font-family:inherit}
    input[type=text]::placeholder{color:#475569}
    input[type=text]:focus{outline:none;border-color:#334155!important}
    .spinner{display:inline-block;animation:spin 1.2s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:36px;background:transparent;cursor:pointer;outline:none}
    input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:999px;background:#1e293b}
    input[type=range].amber::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:#f59e0b;margin-top:-11px;box-shadow:0 2px 8px rgba(0,0,0,0.5)}
    input[type=range].blue::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:#60a5fa;margin-top:-11px;box-shadow:0 2px 8px rgba(0,0,0,0.5)}
    .suggestions{position:absolute;left:0;right:0;top:100%;background:#0f172a;border:1px solid #1e293b;border-top:none;border-radius:0 0 10px 10px;z-index:100;max-height:200px;overflow-y:auto}
    .suggestion{padding:11px 14px;font-size:13px;color:#cbd5e1;cursor:pointer;border-bottom:1px solid #1e293b}
    .suggestion:last-child{border-bottom:none}
    .suggestion:active{background:#1e293b}
  </style>
</head>
<body>
<div id="root"></div>
<script>
const TEMP_COEFF = -0.004;

function calcOutput(ghi, temp, panelKw, inverterKw) {
  return Math.min(Math.max(panelKw * (ghi/1000) * (1 + TEMP_COEFF*(temp-25)), 0), inverterKw);
}

function skyLabel(ghi) {
  if (ghi >= 700) return {label:"Clear sky",        color:"#f59e0b"};
  if (ghi >= 400) return {label:"Partly cloudy",    color:"#84cc16"};
  if (ghi >= 150) return {label:"Overcast",         color:"#94a3b8"};
  if (ghi >= 50)  return {label:"Heavy cloud/Rain", color:"#64748b"};
  return             {label:"Storm/Night",       color:"#334155"};
}

// Error margins by day index based on 8-day blended model study
const ERROR_MARGINS = ["~25%","~30%","~35%","~40%","~45%"];
const DAY_NAMES = ["Today","Tomorrow","Day 3","Day 4","Day 5"];

async function searchGeo(query) {
  const term = query.split(",")[0].trim();
  const r = await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(term)+"&count=5&language=en&format=json");
  const d = await r.json();
  return (d.results||[]).map(x=>({
    name: x.name+(x.admin1?", "+x.admin1:"")+", "+x.country,
    lat: x.latitude, lon: x.longitude, tz: x.timezone
  }));
}

async function fetchOpenMeteo(lat, lon, tz, model) {
  const baseUrl = "https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&hourly=shortwave_radiation,temperature_2m&forecast_days=5&timezone="+encodeURIComponent(tz);
  if (model === "blend") {
    const blendModels = ["icon_seamless","ecmwf_ifs025","gfs_seamless"];
    const results = await Promise.all(blendModels.map(m => fetch(baseUrl+"&models="+m).then(r=>r.json())));
    const times = results[0].hourly.time;
    const ghi  = times.map((_,i) => results.reduce((s,r)=>s+(r.hourly.shortwave_radiation[i]||0),0)/results.length);
    const temp = times.map((_,i) => results.reduce((s,r)=>s+(r.hourly.temperature_2m[i]||0),0)/results.length);
    return {tz:results[0].timezone, time:times, ghi, temp};
  }
  const d = await fetch(baseUrl+"&models="+model).then(r=>r.json());
  return {tz:d.timezone, time:d.hourly.time, ghi:d.hourly.shortwave_radiation, temp:d.hourly.temperature_2m};
}

function svgChart(dayData, inverterKw) {
  if (!dayData||!dayData.length) return "";
  const W=340,H=140,PL=38,PR=10,PT=8,PB=20;
  const cw=W-PL-PR, ch=H-PT-PB, n=dayData.length;
  const px=i=>PL+(i/(n-1||1))*cw;
  const py=v=>PT+ch-(Math.min(v,inverterKw)/inverterKw)*ch;
  let area="M"+px(0)+","+py(dayData[0].output);
  let line="M"+px(0)+","+py(dayData[0].output);
  for(let i=1;i<n;i++){area+=" L"+px(i)+","+py(dayData[i].output);line+=" L"+px(i)+","+py(dayData[i].output);}
  area+=" L"+px(n-1)+","+(PT+ch)+" L"+px(0)+","+(PT+ch)+" Z";
  const yTicks=[0,0.5,1].map(f=>({v:(f*inverterKw).toFixed(0),y:py(f*inverterKw)}));
  const xTicks=dayData.reduce((a,d,i)=>{if(parseInt(d.time)%3===0)a.push({i,t:d.time});return a;},[]);
  let svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">';
  svg+='<defs><linearGradient id="ag'+Math.random().toString(36).slice(2)+'" id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b" stop-opacity="0.4"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/></linearGradient></defs>';
  yTicks.forEach(t=>{
    svg+='<line x1="'+PL+'" y1="'+t.y+'" x2="'+(PL+cw)+'" y2="'+t.y+'" stroke="#1e293b" stroke-width="0.5"/>';
    svg+='<text x="'+(PL-3)+'" y="'+(t.y+3)+'" text-anchor="end" font-size="8" fill="#475569">'+t.v+'kW</text>';
  });
  xTicks.forEach(t=>{
    svg+='<text x="'+px(t.i)+'" y="'+(PT+ch+12)+'" text-anchor="middle" font-size="8" fill="#475569">'+t.t+'</text>';
  });
  svg+='<line x1="'+PL+'" y1="'+py(inverterKw)+'" x2="'+(PL+cw)+'" y2="'+py(inverterKw)+'" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.35"/>';
  svg+='<path d="'+area+'" fill="url(#ag)"/>';
  svg+='<path d="'+line+'" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linejoin="round"/>';
  svg+='</svg>';
  return svg;
}

// ── State ──────────────────────────────────────────────────────────────────
let state = {
  locInput:"", locName:"", suggestions:[],
  panelKw:11, inverterKw:12, showConfig:false,
  model:"blend",
  data:[], days:[], kwh:{}, errorMargins:ERROR_MARGINS,
  summary:null, loading:false, geoLoading:false, error:"",
  lastLat:null, lastLon:null, lastTz:null,
  installPrompt:null
};
function setState(patch){state={...state,...patch};state.locInput = "Christchurch, Canterbury, New Zealand";
state.locName = "Christchurch, Canterbury, New Zealand";
state.lastLat = -43.5333;
state.lastLon = 172.6333;
state.lastTz = "Pacific/Auckland";
render();
// Load Christchurch NZ on startup using hardcoded coords — no ambiguity
window.addEventListener("DOMContentLoaded", () => {
  fetchOpenMeteo(-43.5333, 172.6333, "Pacific/Auckland", state.model)
    .then(json => processForecast(json, json.tz || "Pacific/Auckland", state.panelKw, state.inverterKw))
    .catch(e => { state.loading=false; state.error="Forecast error: "+e.message; render(); });
});}

window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();setState({installPrompt:e});});

// ── Data processing ────────────────────────────────────────────────────────
function processForecast(json, tz, pKw, iKw) {
  const times  = json.time  || (json.hourly && json.hourly.time);
  const ghiArr = json.ghi   || (json.hourly && json.hourly.shortwave_radiation);
  const tempArr= json.temp  || (json.hourly && json.hourly.temperature_2m);
  if (!times||!ghiArr||!tempArr) throw new Error("Invalid forecast data");

  const now = new Date();
  const fmtDate = d => new Intl.DateTimeFormat("en-CA",{timeZone:tz}).format(d);
  const curHour = parseInt(new Intl.DateTimeFormat("en-GB",{timeZone:tz,hour:"numeric",hour12:false}).format(now));

  const days = [];
  for(let i=0;i<5;i++) days.push(fmtDate(new Date(now.getTime()+i*86400000)));

  const kwh = {};
  days.forEach(d=>kwh[d]=0);
  let peakOutput=0, peakHour="";

  const points = times.map((t,i)=>{
    const date=t.slice(0,10), hour=t.slice(11,16);
    const output=calcOutput(ghiArr[i],tempArr[i],pKw,iKw);
    if(kwh[date]!==undefined) kwh[date]+=output;
    if(output>peakOutput){peakOutput=output;peakHour=hour;}
    return {time:hour,date,output:parseFloat(output.toFixed(3)),ghi:Math.round(ghiArr[i]),temp:Math.round(tempArr[i])};
  }).filter(p=>{
    if(!days.includes(p.date)) return false;
    if(p.date===days[0]) return parseInt(p.time)>=curHour;
    return true;
  });

  setState({
    data:points, days, kwh, errorMargins:ERROR_MARGINS,
    summary:{
      todayKwh:(kwh[days[0]]||0).toFixed(1),
      day2Kwh:(kwh[days[1]]||0).toFixed(1),
      day3Kwh:(kwh[days[2]]||0).toFixed(1),
      day2Str:days[1], day3Str:days[2],
      peakOutput:peakOutput.toFixed(2), peakHour
    },
    loading:false
  });
}

async function loadForecast(lat, lon, tz, pKw, iKw) {
  state.lastLat=lat; state.lastLon=lon; state.lastTz=tz;
  setState({loading:true,error:"",summary:null,data:[],days:[],kwh:{}});
  try {
    const json = await fetchOpenMeteo(lat, lon, tz, state.model);
    processForecast(json, json.tz||tz, pKw, iKw);
  } catch(e) {
    setState({loading:false, error:"Forecast error: "+e.message});
  }
}

let geoTimer=null;
function onLocInput(val) {
  state.locInput=val;
  clearTimeout(geoTimer);
  updateSuggestions([]);
  if(val.trim().length<2) return;
  geoTimer=setTimeout(async()=>{
    try{const r=await searchGeo(val);updateSuggestions(r);}catch{}
  },500);
}

function updateSuggestions(results) {
  state.suggestions=results;
  const box=document.getElementById("suggestions-box");
  if(!box) return;
  box.innerHTML="";
  results.forEach(s=>{
    const d=document.createElement("div"); d.className="suggestion"; d.textContent=s.name;
    d.onclick=()=>selectSuggestion(s); box.appendChild(d);
  });
  box.style.display=results.length?"block":"none";
}

function selectSuggestion(s) {
  const inp=document.getElementById("loc-input");
  if(inp) inp.value=s.name;
  state.locInput=s.name; state.suggestions=[];
  setState({locName:s.name,suggestions:[]});
  loadForecast(s.lat,s.lon,s.tz,state.panelKw,state.inverterKw);
}

async function doSearch() {
  const val=state.locInput.trim();
  if(!val) return;
  setState({geoLoading:true,error:"",suggestions:[]});
  try {
    const results=await searchGeo(val);
    if(!results.length) throw new Error("Location not found");
    const s=results[0];
    const inp=document.getElementById("loc-input");
    if(inp) inp.value=s.name;
    state.locInput=s.name;
    setState({locName:s.name,geoLoading:false});
    loadForecast(s.lat,s.lon,s.tz,state.panelKw,state.inverterKw);
  } catch(e) {
    setState({geoLoading:false,error:e.message});
  }
}

function geoLocate() {
  setState({geoLoading:true,error:""});
  navigator.geolocation.getCurrentPosition(async({coords:{latitude:lat,longitude:lon}})=>{
    const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||"UTC";
    setState({locName:"Your location",locInput:"Your location",geoLoading:false});
    loadForecast(lat,lon,tz,state.panelKw,state.inverterKw);
  },()=>setState({geoLoading:false,error:"Location access denied."}));
}

// ── DOM helper ─────────────────────────────────────────────────────────────
function el(tag,attrs,...children){
  const e=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="html") e.innerHTML=v;
    else if(k==="class") e.className=v;
    else e.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{if(c!=null&&c!==false)e.append(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);});
  return e;
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const {locInput,locName,suggestions,panelKw,inverterKw,showConfig,data,days,kwh,errorMargins,
         summary,loading,geoLoading,error,installPrompt,model} = state;
  const root=document.getElementById("root");
  root.innerHTML="";

  // Header
  root.append(el("div",{style:{borderBottom:"1px solid #1e293b",padding:"18px 20px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
    el("div",{style:{display:"flex",alignItems:"center",gap:10}},
      el("div",{style:{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#f59e0b,#f97316)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}},"☀"),
      el("div",null,
        el("div",{style:{fontWeight:700,fontSize:16}},"Solar Yield Forecast"),
        el("div",{style:{color:"#64748b",fontSize:11,marginTop:2}},
          panelKw+" kW panels · "+inverterKw+" kW inverter · ",
          (()=>{const s=el("span",{style:{color:"#60a5fa",cursor:"pointer"}},"edit");s.onclick=()=>setState({showConfig:!showConfig});return s;})()
        )
      )
    ),
    navigator.share?(()=>{const b=el("button",{style:{background:"none",border:"none",color:"#475569",fontSize:20,padding:"4px 8px"}},"⬆");b.onclick=()=>navigator.share({title:"Solar Yield Forecast",url:window.location.href});return b;})():el("span")
  ));

  // Config
  if(showConfig){
    const ratio=(panelKw/inverterKw).toFixed(2);
    const ratioOk=panelKw/inverterKw<=1.25&&panelKw/inverterKw>=0.8;
    const ratioNote=panelKw/inverterKw>1.25?"⚠ clipping likely":panelKw/inverterKw<0.8?"⚠ inverter oversized":"✓ good";
    root.append(el("div",{style:{margin:"12px 20px 0",background:"#0f172a",border:"1px solid #1e293b",borderRadius:14,padding:"18px"}},
      el("div",{style:{fontSize:11,color:"#64748b",marginBottom:16,textTransform:"uppercase",letterSpacing:"0.08em"}},"System Configuration"),
      ...[
        {label:"Solar panels",unit:"kW DC",val:panelKw,key:"panelKw",cls:"amber",color:"#f59e0b"},
        {label:"Inverter",    unit:"kW AC",val:inverterKw,key:"inverterKw",cls:"blue",color:"#60a5fa"},
      ].map(f=>{
        const inp=document.createElement("input");
        inp.type="range";inp.min=0.5;inp.max=30;inp.step=0.5;inp.value=f.val;inp.className=f.cls;
        inp.oninput=e=>setState({[f.key]:parseFloat(e.target.value)});
        return el("div",{style:{marginBottom:16}},
          el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:2}},
            el("div",{style:{fontSize:13,color:"#94a3b8"}},f.label),
            el("div",{style:{fontSize:22,fontWeight:800,color:f.color,letterSpacing:"-0.5px"}},
              f.val,el("span",{style:{fontSize:12,color:"#64748b",marginLeft:3}},f.unit))
          ),inp
        );
      }),
      el("div",{style:{borderTop:"1px solid #1e293b",paddingTop:12,fontSize:11,color:ratioOk?"#34d399":"#fbbf24"}},
        "DC:AC ratio: "+ratio+" — "+ratioNote)
    ));
  }

  // Location input
  const locWrap=el("div",{style:{padding:"18px 20px 0"}},
    el("div",{style:{fontSize:11,color:"#64748b",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}},"Location"),
    el("div",{style:{position:"relative"}},
      el("div",{style:{display:"flex",gap:8}},
        (()=>{
          const inp=el("input",{style:{flex:1,background:"#0f172a",border:"1px solid #1e293b",borderRadius:10,color:"#f1f5f9",padding:"11px 14px",fontSize:14},placeholder:"Enter city…"});
          inp.type="text";inp.id="loc-input";inp.value=locInput;
          inp.oninput=e=>onLocInput(e.target.value);
          inp.onkeydown=e=>{if(e.key==="Enter"){e.target.blur();doSearch();}};
          return inp;
        })(),
        (()=>{const b=el("button",{style:{background:"#1e3a5f",border:"none",borderRadius:10,color:"#93c5fd",padding:"0 16px",fontSize:13,fontWeight:600,minWidth:64}},geoLoading?"…":"Search");b.onclick=doSearch;b.disabled=geoLoading||loading;return b;})(),
        (()=>{const b=el("button",{style:{background:"#0f172a",border:"1px solid #1e293b",borderRadius:10,color:"#94a3b8",padding:"0 14px",fontSize:18}},"⌖");b.onclick=geoLocate;b.disabled=geoLoading||loading;return b;})()
      ),
      el("div",{class:"suggestions",style:{display:"none"},id:"suggestions-box"})
    )
  );
  if(error) locWrap.append(el("div",{style:{color:"#f87171",fontSize:12,marginTop:8}},error));
  root.append(locWrap);

  // Loading
  if(loading||geoLoading){
    root.append(el("div",{style:{textAlign:"center",padding:"60px 0",color:"#475569"}},
      el("div",{class:"spinner",style:{fontSize:28,display:"block",marginBottom:12}},"◌"),
      el("div",{style:{fontSize:13}},geoLoading?"Finding location…":"Fetching 5-day forecast…")
    ));
  }

  // Results
  if(summary&&!loading&&days.length){

    // Model selector
    const modelBar=el("div",{style:{padding:"16px 20px 0",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}});
    [
      {id:"blend",         label:"Blend", sub:"Top 3 avg"},
      {id:"icon_seamless", label:"ICON",  sub:"German"},
      {id:"ecmwf_ifs025",  label:"ECMWF",sub:"European"},
      {id:"gfs_seamless",  label:"GFS",  sub:"American"},
    ].forEach(m=>{
      const active=model===m.id;
      const btn=el("button",{style:{
        background:active?"#1e3a5f":"#0f172a",
        border:active?"1px solid #60a5fa":"1px solid #1e293b",
        borderRadius:8,color:active?"#93c5fd":"#64748b",
        padding:"6px 10px",fontSize:11,cursor:"pointer",
        display:"flex",flexDirection:"column",alignItems:"center",gap:1
      }},
        el("span",{style:{fontWeight:700}},m.label),
        el("span",{style:{fontSize:9,opacity:0.7}},m.sub)
      );
      btn.onclick=()=>{
        state.model=m.id;
        if(state.lastLat) loadForecast(state.lastLat,state.lastLon,state.lastTz,state.panelKw,state.inverterKw);
        else setState({model:m.id});
      };
      modelBar.append(btn);
    });
    if(locName&&state.lastLat&&state.lastLon){
      const twcBtn=el("a",{
        href:"https://weather.com/weather/hourbyhour/l/"+state.lastLat.toFixed(2)+","+state.lastLon.toFixed(2)+"?unit=m",
        target:"_blank",
        style:{marginLeft:"auto",background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,
               color:"#94a3b8",padding:"6px 10px",fontSize:11,textDecoration:"none",
               display:"flex",alignItems:"center",gap:4}
      },"🌐 The Weather Channel");
      modelBar.append(twcBtn);
    }
    root.append(modelBar);

    // Day-by-day sections
    days.forEach((dayStr,dayIdx)=>{
      const dayData=data.filter(d=>d.date===dayStr);
      if(!dayData.length) return;

      const kwhVal=(kwh[dayStr]||0).toFixed(1);
      const errMargin=ERROR_MARGINS[dayIdx]||"~45%";
      const peakKw=dayData.reduce((mx,d)=>d.output>mx?d.output:mx,0).toFixed(2);
      const peakHr=dayData.find(d=>d.output===parseFloat(peakKw))?.time||"";

      // Day header
      root.append(el("div",{style:{margin:"20px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"baseline"}},
        el("div",{style:{fontWeight:700,fontSize:15,color:"#f1f5f9"}},DAY_NAMES[dayIdx]+" · "+dayStr.slice(8)+"/"+dayStr.slice(5,7)),
        el("div",{style:{fontSize:11,color:"#64748b"}},"Est. error: "+errMargin)
      ));

      // Summary strip
      root.append(el("div",{style:{margin:"8px 20px 0",display:"flex",gap:8}},
        el("div",{style:{flex:1,background:"#0f172a",border:"1px solid #1e293b",borderRadius:12,padding:"10px 12px"}},
          el("div",{style:{fontSize:10,color:"#64748b"}},"Total"),
          el("div",{style:{fontSize:20,fontWeight:800,color:"#f59e0b",letterSpacing:"-0.5px"}},kwhVal),
          el("div",{style:{fontSize:10,color:"#64748b"}},"kWh")
        ),
        el("div",{style:{flex:1,background:"#0f172a",border:"1px solid #1e293b",borderRadius:12,padding:"10px 12px"}},
          el("div",{style:{fontSize:10,color:"#64748b"}},"Peak"),
          el("div",{style:{fontSize:20,fontWeight:800,color:"#34d399",letterSpacing:"-0.5px"}},peakKw),
          el("div",{style:{fontSize:10,color:"#64748b"}},"kW at "+peakHr)
        )
      ));

      // Chart
      root.append(el("div",{style:{margin:"8px 20px 0",background:"#0a1628",border:"1px solid #1e293b",borderRadius:14,padding:"12px 8px 6px 0",overflowX:"hidden"}},
        el("div",{html:svgChart(dayData,inverterKw)})
      ));

      // Hour list — skip zero output rows
      const activeHours=dayData.filter(d=>d.output>0);
      if(activeHours.length){
        root.append(el("div",{style:{margin:"8px 20px 0",background:"#0a1628",border:"1px solid #1e293b",borderRadius:14,overflow:"hidden"}},
          ...activeHours.map(d=>{
            const sky=skyLabel(d.ghi);
            const pct=Math.min(100,(d.output/inverterKw)*100);
            return el("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"8px 14px",borderBottom:"1px solid #0f172a"}},
              el("div",{style:{width:36,color:"#64748b",fontSize:11,flexShrink:0}},d.time),
              el("div",{style:{flex:1}},
                el("div",{style:{height:5,background:"#1e293b",borderRadius:999,overflow:"hidden"}},
                  el("div",{style:{width:pct+"%",height:"100%",borderRadius:999,background:"linear-gradient(90deg,"+sky.color+",#f59e0b)"}})
                )
              ),
              el("div",{style:{width:54,textAlign:"right",fontSize:12,fontWeight:700,color:"#f1f5f9",flexShrink:0}},d.output.toFixed(2)+" kW"),
              el("div",{style:{width:76,fontSize:9,color:sky.color,textAlign:"right",flexShrink:0}},sky.label)
            );
          })
        ));
      }
    });

    root.append(el("div",{style:{padding:"12px 20px 0",fontSize:10,color:"#334155"}},
      "Blend: ICON + ECMWF + GFS averaged · Error margins from 8-day Christchurch study"));
  }

  // Install banner
  if(installPrompt){
    root.append(el("div",{style:{margin:"16px 20px 0",background:"rgba(96,165,250,0.08)",border:"1px solid rgba(96,165,250,0.2)",borderRadius:12,padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
      el("div",null,
        el("div",{style:{fontSize:13,fontWeight:600,color:"#93c5fd"}},"📲 Install as app"),
        el("div",{style:{fontSize:11,color:"#475569",marginTop:2}},"Add to home screen for quick access")
      ),
      (()=>{const b=el("button",{style:{background:"#1e3a5f",border:"none",borderRadius:8,color:"#93c5fd",padding:"8px 14px",fontSize:12,fontWeight:600}},"Install");
      b.onclick=async()=>{installPrompt.prompt();const{outcome}=await installPrompt.userChoice;if(outcome==="accepted")setState({installPrompt:null});};return b;})()
    ));
  }

  // Empty state
  if(!loading&&!geoLoading&&!summary){
    root.append(el("div",{style:{textAlign:"center",padding:"70px 20px",color:"#334155"}},
      el("div",{style:{fontSize:52,marginBottom:16}},"☀"),
      el("div",{style:{fontSize:16,color:"#475569",fontWeight:600}},"Enter your location"),
      el("div",{style:{fontSize:12,marginTop:6,color:"#334155",lineHeight:"1.6"}},"5-day solar yield forecast using blended ICON + ECMWF + GFS models.")
    ));
  }
}

state.locInput = "Christchurch, Canterbury, New Zealand";
state.locName = "Christchurch, Canterbury, New Zealand";
state.lastLat = -43.5333;
state.lastLon = 172.6333;
state.lastTz = "Pacific/Auckland";
render();
// Load Christchurch NZ on startup using hardcoded coords — no ambiguity
window.addEventListener("DOMContentLoaded", () => {
  fetchOpenMeteo(-43.5333, 172.6333, "Pacific/Auckland", state.model)
    .then(json => processForecast(json, json.tz || "Pacific/Auckland", state.panelKw, state.inverterKw))
    .catch(e => { state.loading=false; state.error="Forecast error: "+e.message; render(); });
});
</script>
</body>
</html>
